<!DOCTYPE html>
<html lang="es">
<head>
    <script>if (!localStorage.getItem('userId')) { window.location.href = 'login.html'; }</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edición de Plantilla Base - Jefe de Programa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');

        body { font-family: 'Roboto', sans-serif; background-color: #f3f4f6; }

        .a4-container {
            width: 210mm; min-height: 297mm; margin: 20px auto;
            background: white; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 15mm; color: #1a1a1a; position: relative;
        }

        table { width: 100%; border-collapse: collapse; margin-bottom: 1px; table-layout: fixed; }
        
        td, th {
            border: 1px solid #71717a; padding: 3px 6px; font-size: 10px;
            vertical-align: middle; position: relative; word-wrap: break-word; overflow: hidden;
        }

        td[contenteditable="true"]:focus, th[contenteditable="true"]:focus {
            outline: 2px solid #3b82f6; background-color: #eff6ff; outline-offset: -2px;
        }

        .bg-label { background-color: #e4e4e7; font-weight: bold; font-size: 10px; }

        .orientacion-box {
            border: 1px dashed #a1a1aa; background: #f8fafc; padding: 8px;
            font-size: 10px; margin: 8px 0; line-height: 1.4; color: #4b5563;
        }
        
        .input-doc {
            width: 100%; border: none; background: transparent; outline: none; font-size: 10px; padding: 2px;
        }
        select.input-doc { appearance: none; -webkit-appearance: none; cursor: pointer; }
        textarea.input-doc { resize: none; min-height: 30px; }

        .section-num { font-weight: bold; font-size: 11px; margin-top: 12px; margin-bottom: 4px; display: block; outline: none; }
        .section-num[contenteditable="true"]:focus { background-color: #eff6ff; outline: 1px dashed #3b82f6; }

        .nav-bar {
            position: fixed; top: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px); border-bottom: 1px solid #e2e8f0; z-index: 1000;
            padding: 8px 24px; display: flex; justify-content: space-between; align-items: center;
        }

        .toolbar {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: #1e293b; color: white; padding: 12px 20px; border-radius: 12px;
            display: flex; flex-direction: column; gap: 8px; z-index: 2000; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .toolbar-row { display: flex; gap: 8px; align-items: center; justify-content: center; }
        .toolbar button {
            background: #334155; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; transition: 0.2s;
        }
        .toolbar button:hover { background: #475569; }
        .btn-red { background: #7f1d1d !important; } .btn-red:hover { background: #991b1b !important; }
        .btn-indigo { background: #4338ca !important; } .btn-indigo:hover { background: #4f46e5 !important; }
        .btn-green { background: #166534 !important; } .btn-green:hover { background: #15803d !important; }
        .toolbar-divider { width: 1px; height: 20px; background: #475569; margin: 0 4px; }
    </style>
</head>
<body class="pt-14 pb-48">

    <nav class="nav-bar no-print">
        <div class="flex items-center gap-3">
            <div class="h-8 w-1 bg-indigo-600 rounded"></div>
            <div>
                <h1 class="font-bold text-gray-800 text-sm">Edición de Plantilla Base</h1>
                <span class="text-[10px] font-bold uppercase tracking-wider text-indigo-600 bg-indigo-100 px-2 py-0.5 rounded">Modo Administrador</span>
                <span class="text-xs text-gray-400 ml-2">Tip: Usa Ctrl+Z para deshacer cambios</span>
            </div>
        </div>
        <div class="flex gap-2 items-center">
            <button onclick="deshacer()" class="bg-gray-100 text-gray-700 px-3 py-1 text-sm font-bold rounded border border-gray-300 hover:bg-gray-200">Deshacer (Ctrl+Z)</button>
            <button onclick="window.location.href='Jefe.html'" class="bg-gray-100 text-gray-700 px-3 py-1 text-sm font-bold rounded border border-gray-300 hover:bg-gray-200">Volver</button>
            <button onclick="limpiarPlantillaBase()" class="bg-red-600 text-white px-3 py-1 text-sm font-bold rounded shadow hover:bg-red-700">Restaurar Defecto</button>
            <button onclick="guardarPlantillaBase()" class="bg-green-600 text-white px-3 py-1 text-sm font-bold rounded shadow hover:bg-green-700">Guardar Plantilla Base</button>
        </div>
    </nav>

    <div class="toolbar" id="toolbar" style="display: none;">
        <div class="toolbar-row text-xs text-gray-300 font-bold mb-1">
            Herramientas de Celda Seleccionada
        </div>
        <div class="toolbar-row">
            <button onclick="alternarTitulo()" class="btn-indigo">Hacer Título / Normal</button>
            <div class="toolbar-divider"></div>
            <span class="text-[10px] text-gray-400">Insertar Campo:</span>
            <button onclick="cambiarTipoCampo('texto')">Texto Corto</button>
            <button onclick="cambiarTipoCampo('area')">Área Texto</button>
            <button onclick="cambiarTipoCampo('select')">Desplegable</button>
            <button onclick="cambiarTipoCampo('number')">Contador</button>
            <button onclick="cambiarTipoCampo('normal')" class="btn-red">Quitar Campo</button>
        </div>
        <div class="toolbar-row mt-1">
            <button onclick="agregarFilaArriba()">+Fila Arriba</button>
            <button onclick="agregarFilaAbajo()">+Fila Abajo</button>
            <button onclick="eliminarFila()" class="btn-red">Borrar Fila</button>
            
            <div class="toolbar-divider"></div>
            
            <button onclick="agregarColumnaDerUnaFila()" class="btn-green">+Col Derecha (Solo esta fila)</button>
            <button onclick="agregarColumnaDerTodas()" class="btn-indigo">+Col Derecha (A Toda la Tabla)</button>
            
            <div class="toolbar-divider"></div>
            <button onclick="eliminarCelda()" class="btn-red">Borrar Campo / Ajustar</button>
            <button onclick="eliminarColumnaTodas()" class="btn-red">Borrar Col Total</button>
        </div>
    </div>

    <!-- The container that will be editable and saved -->
    <div id="editable-wrapper">
        <div class="a4-container" id="doc-container">
            <!-- Loading template dynamically -->
        </div>
    </div>

    <script>
        let selectedCell = null;
        let undoStack = [];

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('doc-container');
            const savedTemplate = localStorage.getItem('plantilla_base');

            const templateDefault = `

                <td class="bg-label" colspan="2" class="text-center">Tipo de crédito:</td>
                <td colspan="4">

            </tr>
            <!-- Fila de Tipo de Asignatura -->

            <!-- Fila de Distribución de Horas (8 columnas) -->
            <tr>

                <td class="bg-label text-center">Horas teórico – prácticas:</td>

                <td class="bg-label text-center">Horas sesiones sincrónicas</td>
                <td colspan="3" class="text-center font-bold"><input type="number" id="num-hsinc" class="input-doc text-center doc-input"></td>

        </table>

        <div class="orientacion-box">
            <strong>1. Orientaciones sobre cómo desarrollar la identificación de la asignatura:</strong><br>
            La identificación permite comprender su contexto. Una modalidad como la virtual implica diferencias en

        <span class="section-num uppercase">4. SABERES</span>
        <table>
            <tr class="bg-label text-center uppercase">
                <td class="w-[30%]">Saberes</td>
                <td>Criterios de desempeño / Resultados esperados</td>
                <td>Evidencias</td>
            </tr>
            <tr>
                <td class="bg-gray-50 font-bold p-1">
                    DECLARATIVOS: <br><span class="font-normal text-[8px] italic">Escriba aquí...</span>
                </td>
                <td class="p-0"><textarea id="txt-saber-dec-crit" class="input-doc doc-input h-full"></textarea></td>
                <td class="p-0"><textarea id="txt-saber-dec-evi" class="input-doc doc-input h-full"></textarea></td>
            </tr>
            <tr>
                <td class="bg-gray-50 font-bold p-1">
                    PROCEDIMENTALES: <br><span class="font-normal text-[8px] italic">Escriba aquí...</span>
                </td>
                <td class="p-0"><textarea id="txt-saber-pro-crit" class="input-doc doc-input h-full"></textarea></td>
                <td class="p-0"><textarea id="txt-saber-pro-evi" class="input-doc doc-input h-full"></textarea></td>
            </tr>
            <tr>
                <td class="bg-gray-50 font-bold p-1">
                    ACTITUDINALES: <br><span class="font-normal text-[8px] italic">Escriba aquí...</span>
                </td>
                <td class="p-0"><textarea id="txt-saber-act-crit" class="input-doc doc-input h-full"></textarea></td>
                <td class="p-0"><textarea id="txt-saber-act-evi" class="input-doc doc-input h-full"></textarea></td>
            </tr>
        </table>

        <span class="section-num uppercase">5. METODOLOGÍA, MATERIALES Y RECURSOS</span>
        <table>
            <tr>
                <td class="bg-label uppercase">Metodología</td>
            </tr>
            <tr>
                <td class="bg-gray-100 font-bold text-[9px] uppercase">Diagnóstico aprendizajes previos</td>
            </tr>
            <tr>
                <td class="p-0">
                    <textarea id="txt-diagnostico" class="input-doc doc-input min-h-[40px]"
                              placeholder="Escriba aquí..."></textarea>
                </td>
            </tr>
            <tr>
                <td class="bg-gray-100 font-bold text-[9px] uppercase">Metodología</td>
            </tr>
            <tr>
                <td class="p-0">
                    <textarea id="txt-metodologia" class="input-doc doc-input min-h-[60px]"
                              placeholder="Describa la metodología..."></textarea>
                </td>
            </tr>
            <tr>
                <td class="bg-label uppercase">Materiales y Recursos</td>
            </tr>
            <tr>
                <td class="p-0">
                    <textarea id="txt-materiales" class="input-doc doc-input min-h-[40px]"
                              placeholder="Describa aquí..."></textarea>
                </td>
            </tr>
            <tr>
                <td class="bg-label uppercase text-[9px]">Trabajo Independiente</td>
            </tr>
            <tr>
                <td class="p-0">
                    <textarea id="txt-trabajoindep" class="input-doc doc-input min-h-[40px]"

        <span class="section-num uppercase">6. EVALUACIÓN (Se autogenerará durante edición)</span>
        <table>
            <tr class="bg-label text-center uppercase">

                <td>Estrategias e instrumentos para evaluar</td>
            </tr>
        </table>
        
        <span class="section-num uppercase">
            Bibliografía <span class="text-[9px] font-normal italic">
                (Básica,
                complementaria y referenciada)
            </span>
        </span>
        <div class="border border-black p-1">
            <textarea id="txt-bibliografia" class="input-doc doc-input min-h-[60px]"
                      placeholder="Apellido, A. A. (Año). Título..."></textarea>
        </div>

        <!-- CONTROL DE DOCUMENTO -->
        <table class="mt-8">
            <tr>
                <td class="bg-gray-50 font-bold w-1/2">Elaborado por:</td>

            </tr>
            <tr class="h-12">
                <td id="txt-elaborado" class="italic align-bottom text-[9px]"></td>
                <td id="txt-revisado" class="italic align-bottom text-[9px]"></td>
            </tr>
            <tr>
                <td class="bg-gray-50 font-bold">Aprobado por:</td>
                <td class="bg-gray-100 px-2">
                    <div class="flex justify-between items-center text-[7px] font-bold">
                        <div>VERSIÓN: <span id="txt-version">05</span></div>
                        <div>FECHA: <span id="txt-fecha">30-07-2024</span></div>

            `;
            container.innerHTML = savedTemplate || templateDefault;
            saveState(true); // Initial state
            activarEdicion();
        });

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'z') {
                e.preventDefault();
                deshacer();
            }
        });

        function saveState(isInitial = false) {
            const currentHTML = document.getElementById('doc-container').innerHTML;
            if (undoStack.length === 0 || undoStack[undoStack.length - 1] !== currentHTML) {
                undoStack.push(currentHTML);
                if (undoStack.length > 20) undoStack.shift(); // Keep max 20 states
            }
        }

        function deshacer() {
            if (undoStack.length > 1) {
                undoStack.pop(); // Remove current
                const previousHTML = undoStack[undoStack.length - 1];
                document.getElementById('doc-container').innerHTML = previousHTML;
                activarEdicion();
                esconderToolbar();
            }
        }

        function activarEdicion() {
            // Re-bind listeners for editing
            const container = document.getElementById('doc-container');
            const cells = container.querySelectorAll('td, th, .section-num');
            
            cells.forEach(cell => {
                cell.setAttribute('contenteditable', 'true');
                cell.onclick = (e) => {
                    // prevent input clicks from triggering cell logic sometimes
                    if(['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)) return;
                };
                cell.onfocus = (e) => {
                    if(e.target.tagName === 'TD' || e.target.tagName === 'TH') {
                        selectedCell = e.target;
                        document.getElementById('toolbar').style.display = 'flex';
                    }
                };
            });
            // Re-bind inputs to not be blocked
            container.querySelectorAll('input, select, textarea').forEach(el => {
                el.onfocus = () => {
                    selectedCell = el.closest('td, th');
                    document.getElementById('toolbar').style.display = 'flex';
                };
            });
        }

        function esconderToolbar() {
            document.getElementById('toolbar').style.display = 'none';
            selectedCell = null;
        }

        // --- CALCULO PROPORCIONAL ---
        function recalcularProporcionesFila(tr) {
            const table = tr.closest('table');
            table.style.tableLayout = 'auto';

            const tds = Array.from(tr.querySelectorAll(':scope > td, :scope > th'));
            if(tds.length === 0) return;
            // Clean colspans and define pure percentages
            const percentage = (100 / tds.length).toFixed(2);
            tds.forEach(td => {
                td.removeAttribute('colspan');
                td.style.width = percentage + '%';
            });
        }

        // --- ACCIONES CELDA INDIVIDUAL ---
        function alternarTitulo() {
            saveState();
            if (!selectedCell) return;
            selectedCell.classList.toggle('bg-label');
            if(selectedCell.classList.contains('bg-label')) {
                selectedCell.style.textAlign = 'center';
            } else {
                selectedCell.style.textAlign = 'left';
            }
        }

        function cambiarTipoCampo(tipo) {
            saveState();
            if (!selectedCell) return;
            selectedCell.innerHTML = '';
            
            if (tipo === 'select') {
                selectedCell.innerHTML = `<select class="input-doc doc-input"><option value="">Desplegable...</option><option value="1">Opción 1</option><option value="2">Opción 2</option></select>`;
            } else if (tipo === 'number') {
                selectedCell.innerHTML = `<input type="number" class="input-doc text-center doc-input" placeholder="0">`;
            } else if (tipo === 'texto') {
                selectedCell.innerHTML = `<input type="text" class="input-doc doc-input" placeholder="Texto corto...">`;
            } else if (tipo === 'area') {
                selectedCell.innerHTML = `<textarea class="input-doc doc-input" placeholder="Comentarios..."></textarea>`;
            } else if (tipo === 'normal') {
                selectedCell.innerHTML = `Escriba título normal...`;
            }
            activarEdicion();
        }

        function eliminarCelda() {
            saveState();
            if (!selectedCell) return;
            const tr = selectedCell.closest('tr');
            selectedCell.remove();
            recalcularProporcionesFila(tr);
            esconderToolbar();
        }

        // --- ACCIONES FILA ---
        function agregarFilaAbajo() {
            saveState();
            if (!selectedCell) return;
            const tr = selectedCell.closest('tr');
            const newTr = tr.cloneNode(true);
            newTr.querySelectorAll('td, th').forEach(td => {
                td.innerHTML = '&nbsp;'; 
                td.removeAttribute('class'); 
            });
            tr.parentNode.insertBefore(newTr, tr.nextSibling);
            activarEdicion();
        }

        function agregarFilaArriba() {
            saveState();
            if (!selectedCell) return;
            const tr = selectedCell.closest('tr');
            const newTr = tr.cloneNode(true);
            newTr.querySelectorAll('td, th').forEach(td => {
                td.innerHTML = '&nbsp;';
                td.removeAttribute('class'); 
            });
            tr.parentNode.insertBefore(newTr, tr);
            activarEdicion();
        }

        function eliminarFila() {
            saveState();
            if (!selectedCell) return;
            const tr = selectedCell.closest('tr');
            tr.remove();
            esconderToolbar();
        }

        // --- ACCIONES COLUMNA (SOLO ESTA FILA O TODAS) ---
        function agregarColumnaDerUnaFila() {
            saveState();
            if (!selectedCell) return;
            const tr = selectedCell.closest('tr');
            const newTd = document.createElement('td');
            newTd.innerHTML = '&nbsp;';
            tr.insertBefore(newTd, selectedCell.nextSibling);
            recalcularProporcionesFila(tr); // Se comparte proporcionalmente (eje: 50/50 o 33/33/33)
            activarEdicion();
        }

        function agregarColumnaDerTodas() {
            saveState();
            if (!selectedCell) return;
            const table = selectedCell.closest('table');
            const cellIdx = selectedCell.cellIndex;
            Array.from(table.rows).forEach(tr => {
                // If row has enough cells
                if(cellIdx < tr.cells.length) {
                    const newTd = document.createElement('td');
                    newTd.innerHTML = '&nbsp;';
                    tr.insertBefore(newTd, tr.cells[cellIdx].nextSibling);
                    recalcularProporcionesFila(tr);
                }
            });
            activarEdicion();
        }

        function eliminarColumnaTodas() {
            saveState();
            if (!selectedCell) return;
            const table = selectedCell.closest('table');
            const cellIdx = selectedCell.cellIndex;
            Array.from(table.rows).forEach(tr => {
                if(tr.cells[cellIdx]) {
                    tr.deleteCell(cellIdx);
                    recalcularProporcionesFila(tr);
                }
            });
            esconderToolbar();
        }

        function guardarPlantillaBase() {
            const cleanContainer = document.getElementById('doc-container').cloneNode(true);
            cleanContainer.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
            
            // Generate IDs for new dynamic inputs
            const inputs = cleanContainer.querySelectorAll('input.doc-input, select.doc-input, textarea.doc-input');
            inputs.forEach(i => {
                if(!i.id) i.id = 'dinamico-' + Math.random().toString(36).substr(2, 9);
            });

            localStorage.setItem('plantilla_base', cleanContainer.innerHTML);
            alert("Plantilla Base guardada exitosamente y estará disponible para los docentes.");
            window.location.href = 'Jefe.html';
        }

        function limpiarPlantillaBase() {
            if(confirm("¿Restaurar diseño original? Se borrará la plantilla personalizada.")) {
                localStorage.removeItem('plantilla_base');
                location.reload();
            }
        }
    </script>
</body>
</html>
