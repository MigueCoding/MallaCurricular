 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Malla Curricular ITM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="Content/Login.css">
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen">

    <div class="login-container bg-white p-8 rounded-xl shadow-2xl w-full max-w-md border-t-4 border-blue-600">
        <div class="text-center mb-8">
            <img src="logo2020.png" alt="Logo ITM" class="w-32 mx-auto mb-4">
            <h1 class="text-2xl font-bold text-gray-800">Bienvenido</h1>
            <p class="text-gray-500 text-sm">Ingresa tus credenciales para continuar</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-semibold text-gray-700 mb-1">Usuario o Correo</label>
                <input type="text" id="username" name="username" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">Contraseña</label>
                <input type="password" id="password" name="password" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
            </div>

            <div id="login-error" class="hidden text-red-500 text-sm text-center font-medium">
                Usuario o contraseña incorrectos.
            </div>

            <button type="submit" id="btn-submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition duration-300 transform hover:scale-[1.02]">
                Iniciar Sesión
            </button>

            <div class="mt-4 text-center">
                <p class="text-sm text-gray-600">
                    ¿No tienes una cuenta?
                    <a href="Register.html" class="text-blue-600 hover:text-blue-800 font-semibold transition">
                        Regístrate aquí
                </p>
            </div>
        </form>

        <div class="mt-6 text-center">
            <a href="plana.html" class="text-blue-600 hover:text-blue-800 text-sm font-medium transition">
                ← Volver a la Malla Curricular
            </a>
        </div>
    </div>

    <script src="Scripts/Login.js"></script>
</body>
</html>
