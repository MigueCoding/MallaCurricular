<!DOCTYPE html>
<html lang="es">

<head>
    <script>if (!localStorage.getItem('userId')) { window.location.href = 'login.html'; }</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Docente - Compromiso Académico</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 h-screen flex overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-80 bg-white border-r flex flex-col shadow-lg">
        <div class="p-5 border-b text-center">
            <img src="logo2020.png" class="w-28 mb-4 mx-auto">
            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Mis Grupos</h2>
            <p class="text-sm font-semibold text-blue-700 mt-2" id="profesor-name"></p>
        </div>

        <nav id="materias-list" class="flex-1 overflow-y-auto">
            <div class="p-6 text-center text-gray-400 text-sm">Cargando grupos...</div>
        </nav>

        <div class="p-4 border-t">
            <button onclick="logout()"
                class="w-full bg-red-500 hover:bg-red-600 text-white py-2 rounded font-bold">Cerrar Sesión</button>
        </div>
    </aside>

    <!-- ESTADO VACÍO -->
    <div id="empty-state" class="flex-1 flex flex-col items-center justify-center text-gray-300">
        <div class="text-7xl mb-4">👨‍🏫</div>
        <p>Seleccione un grupo del listado</p>
    </div>

    <!-- MAIN EDITOR CONTENT -->
    <main id="editor-container" class="flex-1 flex flex-col overflow-hidden hidden bg-gray-50">
        <header class="bg-white border-b p-6 flex justify-between items-center shadow-sm z-10">
            <div>
                <h1 class="text-2xl font-bold text-gray-800" id="header-subject-name"></h1>
                <p class="text-sm text-gray-500 font-semibold" id="header-group-name"></p>
            </div>
            <div class="flex gap-2">
                <button onclick="openMicrodiseno()"
                    class="bg-indigo-600 text-white px-6 py-2 rounded font-bold shadow hover:bg-indigo-700 transition">
                    Ver Microdiseño
                </button>
            </div>
        </header>
    </main>

    <script src="Scripts/profesor.js?v=3"></script>
</body>

</html>
