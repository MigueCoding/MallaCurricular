<!DOCTYPE html>
<html lang="es">

<head>
    <script>if (!localStorage.getItem('userId')) { window.location.href = 'login.html'; }</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Docente - Compromiso Académico</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 h-screen flex overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-80 bg-white border-r flex flex-col shadow-lg">
        <div class="p-5 border-b text-center">
            <img src="logo2020.png" class="w-28 mb-4 mx-auto">
            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Mis Grupos</h2>
            <p class="text-sm font-semibold text-blue-700 mt-2" id="profesor-name"></p>
        </div>

        <nav id="materias-list" class="flex-1 overflow-y-auto">
            <div class="p-6 text-center text-gray-400 text-sm">Cargando grupos...</div>
        </nav>

        <div class="p-4 border-t">
            <button onclick="logout()"
                class="w-full bg-red-500 hover:bg-red-600 text-white py-2 rounded font-bold">Cerrar Sesión</button>
        </div>
    </aside>

    <!-- ESTADO VACÍO -->
    <div id="empty-state" class="flex-1 flex flex-col items-center justify-center text-gray-300">
        <div class="text-7xl mb-4">👨‍🏫</div>
        <p>Seleccione un grupo del listado</p>
    </div>

    <!-- MAIN EDITOR CONTENT -->
    <main id="editor-container" class="flex-1 flex flex-col overflow-hidden hidden bg-gray-50">
        <header class="bg-white border-b p-6 flex justify-between items-center shadow-sm z-10">
            <div>
                <h1 class="text-2xl font-bold text-gray-800" id="header-subject-name"></h1>
                <p class="text-sm text-gray-500 font-semibold" id="header-group-name"></p>
            </div>
            <div class="flex gap-2">
                <button onclick="openMicrodiseno()"
                    class="bg-indigo-600 text-white px-6 py-2 rounded font-bold shadow hover:bg-indigo-700 transition">
                    Ver Microdiseño
                </button>
                <button onclick="saveAllChanges()"
                    class="bg-blue-600 text-white px-6 py-2 rounded font-bold shadow hover:bg-blue-700 transition">
                    Guardar Cambios
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 space-y-8">

            <!-- COMPROMISO ACADEMICO -->
            <section class="bg-white rounded-lg shadow border overflow-hidden">
                <div class="bg-[#3b82f6] text-white p-3 text-center font-bold">
                    Detalles de concertación de evaluaciones (Compromiso Académico)
                </div>

                <div class="p-4">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-gray-100 text-gray-700 font-bold border-b">
                            <tr>
                                <th class="p-3">N°</th>
                                <th class="p-3">AEAE</th>
                                <th class="p-3">TIA</th>
                                <th class="p-3">Valor %</th>
                                <th class="p-3">Fecha</th>
                                <th class="p-3 text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="evaluations-body">
                            <!-- Rows dynamicas -->
                        </tbody>
                        <tfoot class="bg-gray-200 font-bold text-gray-800">
                            <tr>
                                <td colspan="3" class="p-3 text-right">TOTAL</td>
                                <td class="p-3" id="total-percent">0%</td>
                                <td colspan="2"></td>
                            </tr>
                        </tfoot>
                    </table>

                    <div class="mt-4">
                        <button onclick="addEvaluationRow()"
                            class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded text-sm transition">
                            + Añadir Momento Evaluativo
                        </button>
                    </div>
                </div>
            </section>

            <!-- RESPUESTAS DE ESTUDIANTES -->
            <section class="bg-white rounded-lg shadow border overflow-hidden">
                <div class="bg-[#3b82f6] text-white p-3 text-center font-bold">
                    Respuestas de Estudiantes
                </div>

                <div class="p-4 overflow-x-auto">
                    <table class="w-full text-sm text-left border-collapse">
                        <thead class="bg-gray-50 text-gray-600 font-bold border-b">
                            <tr>
                                <th class="p-3 border-b">Estudiante</th>
                                <th class="p-3 border-b">Estado</th>
                                <th class="p-3 border-b">Fecha de Respuesta</th>
                                <th class="p-3 border-b w-1/3">Observaciones</th>
                            </tr>
                        </thead>
                        <tbody id="students-responses-body" class="text-gray-700">
                            <!-- Rows dynamicos -->
                        </tbody>
                    </table>
                </div>
            </section>

        </div>
    </main>

    <script src="Scripts/profesor.js?v=3"></script>
</body>

</html>
