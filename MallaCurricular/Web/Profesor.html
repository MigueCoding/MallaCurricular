<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Docente - ITM</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS exclusivo profesor -->
    <link rel="stylesheet" href="Content/profesor.css">
</head>

<body class="bg-gray-100 h-screen flex overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-80 bg-white border-r flex flex-col shadow-lg">
        <div class="p-5 border-b">
            <img src="logo2020.png" class="w-28 mb-4 mx-auto">
            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Mis Asignaturas</h2>

            <input id="search-materia"
                   oninput="filterMaterias()"
                   type="text"
                   placeholder="Buscar materia..."
                   class="mt-3 w-full px-3 py-2 text-sm border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <nav id="materias-list" class="flex-1 overflow-y-auto">
            <div class="p-6 text-center text-gray-400 text-sm">
                Cargando materias...
            </div>
        </nav>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="flex-1 flex flex-col overflow-hidden">

        <!-- HEADER -->
        <header id="header-dinamico" class="bg-blue-900 text-white p-6 shadow">
            <h1 class="text-2xl font-bold">Gestión Académica</h1>
            <p class="text-blue-200 text-sm">Seleccione una asignatura</p>
        </header>
        <!-- VISTA CENTRAL DE LA MATERIA -->
        <div id="subject-preview" class="flex-1 overflow-y-auto hidden">

            <div class="bg-white rounded-2xl shadow-xl border max-w-xl w-full p-10 text-center space-y-6 animate-fade-in">

                <div>
                    <h2 id="preview-name" class="text-2xl font-black text-slate-800 uppercase"></h2>
                    <p id="preview-code" class="text-xs text-gray-400 font-mono mt-1"></p>
                </div>

                <div class="grid grid-cols-3 gap-4 text-sm">
                    <div class="bg-gray-50 rounded-lg p-4">
                        <p class="text-gray-400 text-xs">CRÉDITOS</p>
                        <p id="preview-credits" class="text-xl font-bold"></p>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-4">
                        <p class="text-gray-400 text-xs">TPS</p>
                        <p id="preview-tps" class="text-xl font-bold"></p>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-4">
                        <p class="text-gray-400 text-xs">TIS</p>
                        <p id="preview-tis" class="text-xl font-bold"></p>
                    </div>
                </div>

                <button onclick="openEditor()"
                        class="bg-[#1e40af] text-white px-10 py-3 rounded-xl font-bold shadow-lg hover:bg-blue-800 transition-all active:scale-95">
                    EDITAR MICROCURRÍCULO
                </button>
            </div>
        </div>

        <!-- EDITOR -->
        <section id="editor-container" class="flex-1 overflow-y-auto p-6 hidden">
            <div class="max-w-4xl mx-auto space-y-6">
                <!-- BOTÓN VOLVER -->
                <div class="flex items-center">
                    <button onclick="backToSelected()"
                            class="text-sm font-bold text-blue-700 hover:underline flex items-center gap-1">
                        ← Volver a materias
                    </button>
                </div>

                <!-- MICROCURRÍCULO -->
                <div class="bg-white rounded-xl border shadow">
                    <div class="px-6 py-3 border-b font-bold text-gray-700">
                        📚 Microcurrículo
                    </div>
                    <div class="p-6">
                        <textarea id="micro-content"
                                  class="w-full h-52 p-4 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                                  placeholder="Escriba aquí el microcurrículo..."></textarea>
                    </div>
                </div>

                <!-- RÚBRICAS -->
                <div class="bg-white rounded-xl border shadow">
                    <div class="px-6 py-3 border-b flex justify-between items-center">
                        <span class="font-bold text-gray-700">⚖️ Rúbricas</span>
                        <span id="total-badge" class="text-xs font-bold bg-gray-100 px-3 py-1 rounded">
                            Total: 0%
                        </span>
                    </div>
                    <div class="p-6">
                        <div id="rubric-rows" class="space-y-3"></div>

                        <button onclick="addRubricRow()"
                                class="mt-4 text-blue-700 text-xs font-bold hover:underline">
                            + Añadir actividad
                        </button>
                    </div>
                </div>

                <!-- BOTONES -->
                <div class="flex justify-end gap-3">
                    <button onclick="saveChanges()"
                            class="bg-blue-900 text-white px-8 py-3 rounded-lg font-bold hover:bg-blue-800 active:scale-95">
                        Guardar
                    </button>
                </div>


            </div>
        </section>

        <!-- ESTADO VACÍO -->
        <div id="empty-state" class="flex-1 flex flex-col items-center justify-center text-gray-300">
            <div class="text-7xl mb-4">📘</div>
            <p>Seleccione una materia del listado</p>
        </div>

    </main>

    <script src="Scripts/profesor.js"></script>
</body>
</html>
