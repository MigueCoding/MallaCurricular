<!DOCTYPE html>
<html lang="es">

<head>
    <script>if (!localStorage.getItem('userId')) { window.location.href = 'login.html'; }</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microdiseño Curricular - ITM (Docente)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f3f4f6;
        }

        .a4-container {
            width: 210mm;
            min-height: 297mm;
            margin: 20px auto;
            background: white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 15mm;
            color: #1a1a1a;
            position: relative;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1px;
            table-layout: fixed; /* Asegura que las columnas respeten los anchos */
        }

        td,
        th {
            border: 1px solid #71717a;
            padding: 3px 6px;
            font-size: 10px;
            vertical-align: middle;
            overflow: hidden;
        }

        .bg-label {
            background-color: #e4e4e7;
            font-weight: bold;
            font-size: 10px;
        }

        .orientacion-box {
            border: 1px dashed #a1a1aa;
            background: #f8fafc;
            padding: 8px;
            font-size: 10px;
            margin: 8px 0;
            line-height: 1.4;
            color: #4b5563;
        }

        .input-doc {
            width: 100%;
            border: none;
            background: transparent;
            outline: none;
            font-size: 10px;
            padding: 2px;
        }

            .input-doc:focus {
                background-color: #fffbeb;
            }

        textarea.input-doc {
            resize: none;
            min-height: 30px;
        }

        .section-num {
            font-weight: bold;
            font-size: 11px;
            margin-top: 12px;
            margin-bottom: 4px;
            display: block;
        }

        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #e2e8f0;
            z-index: 1000;
            padding: 8px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        @media print {
            .no-print {
                display: none !important;
            }

            body {
                background: white;
                margin: 0;
                padding: 0;
            }

            .a4-container {
                margin: 0;
                box-shadow: none;
                width: 100%;
                padding: 10mm;
            }

            .orientacion-box {
                display: none !important;
            }
        }
    </style>
</head>

<body class="pt-14 pb-10">

    <nav class="nav-bar no-print">
        <div class="flex items-center gap-3">
            <div class="h-8 w-1 bg-blue-600 rounded"></div>
            <div>
                <h1 class="font-bold text-gray-800 text-sm" id="header-asig-title">Editor de Microdiseño Curricular</h1>
                <span id="badge-estado"
                      class="text-[10px] font-bold uppercase tracking-wider text-gray-500">Borrador</span>
            </div>
        </div>
        <div class="flex gap-2 items-center">
            <button onclick="goBack()" class="bg-gray-100 text-gray-700 px-3 py-1 text-sm font-bold rounded border border-gray-300 hover:bg-gray-200 transition-colors flex items-center gap-1">
                <span>←</span> Volver
            </button>
            <div id="action-buttons" class="flex gap-2"></div>
        </div>
    </nav>

    <div class="a4-container" id="doc-container">
        <div class="flex flex-col items-center justify-center py-20 text-gray-400">
            <svg class="animate-spin h-8 w-8 text-blue-600 mb-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="text-sm font-semibold">Cargando diseño y estructura desde el servidor...</p>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal-rechazo"
         class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden items-center justify-center z-[2000] no-print px-4">
        <div class="bg-white p-6 rounded-xl shadow-2xl w-full max-w-md border border-slate-200">
            <h2 class="text-lg font-bold text-slate-800 mb-2">Rechazar Microdiseño</h2>
            <p class="text-xs text-slate-500 mb-4">Indique explícitamente la razón para que el docente la corrija.</p>
            <textarea id="txt-motivo-rechazo"
                      class="w-full border border-slate-300 rounded-lg p-3 text-sm h-32 mb-4 focus:ring-2 focus:ring-red-500 outline-none transition-all"
                      placeholder="Escriba aquí..."></textarea>
            <div class="flex justify-end gap-3">
                <button onclick="closeModalRechazo()"
                        class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">
                    Cancelar
                </button>
                <button onclick="submitRechazo()"
                        class="px-5 py-2 text-sm font-bold bg-red-600 text-white rounded-lg hover:bg-red-700 shadow-lg shadow-red-200 transition-all">
                    Enviar
                    Rechazo
                </button>
            </div>
        </div>
    </div>


    <script src="Scripts/microdiseno.js?v=5"></script>
</body>

</html>
