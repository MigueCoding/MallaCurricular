<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Malla Curricular - ITM (Estudiante)</title>
    <link rel="stylesheet" href="Content/plana.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="container">
        <div class="filters">
            <img src="logo2020.png" alt="ITM Logo" />
            <h2 class="text-xl font-bold text-gray-800 mb-4">Filtros</h2>
            <div class="error-message" id="error-message"></div>

            <div class="filter-group mb-6">
                <label class="filter-label">Malla Curricular</label>
                <select class="filter-select w-full border rounded p-1" id="malla-select">
                    <option value="">Seleccione una malla</option>
                </select>
            </div>

            <div id="summary-container"></div>

            <div class="mt-10 pt-6 border-t border-gray-200">
                <button id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition duration-200 flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M3 3a1 1 0 011 1v12a1 1 0 11-2 0V4a1 1 0 011-1zm7.707 3.293a1 1 0 010 1.414L9.414 9H17a1 1 0 110 2H9.414l1.293 1.293a1 1 0 01-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0z" clip-rule="evenodd" />
                    </svg>
                    Iniciar Sesión
                </button>
            </div>
        </div>

        <div class="courses">
            <div class="header">
                <h1 id="malla-title">Malla Curricular - ITM</h1>
                <p id="malla-version" style="font-size: 0.9rem; margin-top: 4px; color: #e0e7ff;"></p>
            </div>

            <div class="semester-grid" id="semester-grid"></div>
        </div>
    </div>

    <script src="Scripts/plana.js?v=2"></script>
</body>
</html>
