<!DOCTYPE html>
<html lang="es">

<head>
    <script>if (!localStorage.getItem('userId')) { window.location.href = 'login.html'; }</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compromiso Académico - ITM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f3f4f6;
        }

        .a4-container {
            width: 210mm;
            min-height: 297mm;
            margin: 20px auto;
            background: white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 15mm;
            color: #1a1a1a;
            position: relative;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1px;
            table-layout: fixed;
        }

        td,
        th {
            border: 1px solid #71717a;
            padding: 3px 6px;
            font-size: 10px;
            vertical-align: middle;
            overflow: hidden;
        }

        .bg-label {
            background-color: #e4e4e7;
            font-weight: bold;
            font-size: 10px;
        }

        .input-doc {
            width: 100%;
            border: none;
            background: transparent;
            outline: none;
            font-size: 10px;
            padding: 2px;
        }

        .input-doc:focus {
            background-color: #fffbeb;
        }

        textarea.input-doc {
            resize: none;
            min-height: 30px;
        }

        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #e2e8f0;
            z-index: 1000;
            padding: 8px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: white;
            padding: 24px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        @media print {
            .no-print {
                display: none !important;
            }

            body {
                background: white;
                margin: 0;
                padding: 0;
            }

            .a4-container {
                margin: 0;
                box-shadow: none;
                width: 100%;
                padding: 10mm;
            }
        }
    </style>
</head>

<body class="pt-14 pb-10">

    <nav class="nav-bar no-print">
        <div class="flex items-center gap-3">
            <div class="h-8 w-1 bg-yellow-600 rounded"></div>
            <div>
                <h1 class="font-bold text-gray-800 text-sm">Compromiso Académico</h1>
                <p id="status-label" class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Cargando...</p>
            </div>
        </div>
        <div class="flex gap-2 items-center">
            <!-- BOTONES PROFESOR -->
            <div id="prof-actions" class="hidden flex gap-2">
                <button onclick="saveCompromiso(true)" class="bg-green-600 text-white px-4 py-2 rounded font-bold shadow hover:bg-green-700 transition text-sm">
                    Confirmar y Publicar
                </button>
                <button onclick="saveCompromiso(false)" class="bg-blue-500 text-white px-4 py-2 rounded font-bold shadow hover:bg-blue-600 transition text-sm">
                    Guardar Borrador
                </button>
            </div>
            <!-- BOTONES ESTUDIANTE -->
            <div id="student-actions" class="hidden flex gap-2">
                <button onclick="openAcceptModal()" class="bg-green-600 text-white px-4 py-2 rounded font-bold shadow hover:bg-green-700 transition text-sm">
                    Aceptar Compromiso
                </button>
                <button onclick="openRejectModal()" class="bg-red-600 text-white px-4 py-2 rounded font-bold shadow hover:bg-red-700 transition text-sm">
                    Rechazar
                </button>
            </div>
            <button onclick="window.close()" class="bg-gray-100 text-gray-700 px-3 py-1 text-sm font-bold rounded border border-gray-300 hover:bg-gray-200 transition-colors flex items-center gap-1">
                Cerrar
            </button>
        </div>
    </nav>

    <div class="a4-container" id="doc-container">
        <!-- Contenido dinámico -->
    </div>

    <!-- MODAL RECHAZAR -->
    <div id="modal-reject" class="modal">
        <div class="modal-content">
            <h2 class="text-xl font-bold mb-4 text-red-700">Rechazar Compromiso Académico</h2>
            <p class="text-sm text-gray-600 mb-4">Por favor, indica el motivo del rechazo para que el docente pueda revisarlo.</p>
            <textarea id="reject-reason" class="w-full border rounded-lg p-3 text-sm h-32 focus:ring-2 focus:ring-red-500 outline-none" placeholder="Escribe aquí tu motivo..."></textarea>
            <div class="flex justify-end gap-3 mt-6">
                <button onclick="closeModals()" class="px-4 py-2 text-sm font-bold text-gray-500 hover:text-gray-700">Cancelar</button>
                <button onclick="enviarRespuesta('Rechazado')" class="bg-red-600 text-white px-6 py-2 rounded-lg font-bold shadow hover:bg-red-700 transition">Enviar Rechazo</button>
            </div>
        </div>
    </div>

    <!-- MODAL ACEPTAR -->
    <div id="modal-accept" class="modal">
        <div class="modal-content">
            <h2 class="text-xl font-bold mb-4 text-green-700">Aceptar Compromiso Académico</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">Número de Documento</label>
                    <input type="text" id="stu-doc" maxlength="10" class="w-full border rounded-lg p-2 text-sm focus:ring-2 focus:ring-green-500 outline-none" placeholder="10 dígitos numéricos">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">Nombre Completo</label>
                    <input type="text" id="stu-name" class="w-full border rounded-lg p-2 text-sm focus:ring-2 focus:ring-green-500 outline-none" placeholder="Sin números ni carácteres especiales">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">Teléfono</label>
                    <input type="text" id="stu-tel" maxlength="10" class="w-full border rounded-lg p-2 text-sm focus:ring-2 focus:ring-green-500 outline-none" placeholder="Máximo 10 dígitos">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">Firma Digital (Nombre o iniciales)</label>
                    <input type="text" id="stu-sign" class="w-full border rounded-lg p-2 text-sm focus:ring-2 focus:ring-green-500 outline-none" placeholder="Firma">
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModals()" class="px-4 py-2 text-sm font-bold text-gray-500 hover:text-gray-700">Cancelar</button>
                <button onclick="enviarRespuesta('Aceptado')" class="bg-green-600 text-white px-6 py-2 rounded-lg font-bold shadow hover:bg-green-700 transition">Aceptar y Firmar</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:49514/api';
        const urlParams = new URLSearchParams(window.location.search);
        const grupoId = urlParams.get('grupoId');
        const role = urlParams.get('role') || 'estudiante';
        const currentUserId = localStorage.getItem('userId');

        // PLANTILLA PREDETERMINADA (FALLBACK)
        const templateITM = `
        <!-- HEADER -->
        <table class="mb-5">
            <tr>
                <td rowspan="3" class="w-[20%] text-center">
                    <img src="LOGO ITM 2020-02.png" alt="ITM" class="h-14 mx-auto opacity-100">
                </td>
                <td rowspan="3" class="text-center font-bold text-sm uppercase">Compromiso Académico</td>
                <td class="bg-gray-50 font-bold w-16">Código</td>
                <td class="w-24">FDE 049</td>
            </tr>
            <tr>
                <td class="bg-gray-50 font-bold">Versión</td>
                <td>08</td>
            </tr>
            <tr>
                <td class="bg-gray-50 font-bold">Fecha</td>
                <td>06-02-2025</td>
            </tr>
        </table>

        <!-- IDENTIFICATION TABLE -->
        <table class="mb-4">
            <tr>
                <td class="bg-label w-[20%]">Docente</td>
                <td colspan="5"><input type="text" id="asig-docente" class="input-doc font-bold doc-input"></td>
            </tr>
            <tr>
                <td class="bg-label">Programa académico</td>
                <td colspan="5"><input type="text" class="input-doc doc-input"></td>
            </tr>
            <tr>
                <td class="bg-label">Asignatura</td>
                <td colspan="2"><input type="text" id="asig-nombre" class="input-doc font-bold" readonly></td>
                <td class="bg-label w-[10%] text-center">Código</td>
                <td class="w-[15%]"><input type="text" id="asig-codigo" class="input-doc font-bold bg-gray-50 text-center" readonly></td>
                <td class="bg-label w-[10%] text-center">Grupo</td>
                <td class="w-[15%]"><input type="text" class="input-doc font-bold doc-input text-center"></td>
            </tr>
            <tr>
                <td class="bg-label">Período académico</td>
                <td colspan="3"><input type="text" class="input-doc doc-input"></td>
                <td class="bg-label text-center">Fecha</td>
                <td colspan="2"><input type="date" class="input-doc doc-input"></td>
            </tr>
        </table>

        <div class="text-justify text-[10px] mb-4">
            En la primera semana de clases el docente presenta a los estudiantes el Microcurrículo de la asignatura (competencias, Contenido temático y los indicadores de logro); informa la programación de talleres institucionales; asimismo la programación de la evaluación de la asignatura
        </div>

        <div class="text-[10px] font-bold text-blue-800 mb-4 flex gap-2">
            <span>Competencia:</span>
            <textarea class="input-doc doc-input text-blue-800 flex-1 italic" placeholder="(Escribir la competencia a adquirir según el microcurrículo de la asignatura)" rows="2"></textarea>
        </div>

        <div class="font-bold text-[11px] mb-2">Evaluación del curso (capítulo XII del Reglamento Estudiantil - RE)</div>
        <table class="mb-4">
            <tr class="bg-label text-center font-bold">
                <td class="w-[60%]">Eventos evaluativos</td>
                <td class="w-[20%]">Ponderación (%)</td>
                <td class="w-[20%]">Fecha</td>
            </tr>
            <tr>
                <td class="text-blue-800 italic text-[9px]">
                    <textarea class="input-doc doc-input text-blue-800 min-h-[50px]" placeholder="Describir o nombrar los saberes que se van a evaluar de acuerdo con lo establecido en el microcurrículo vigente y la forma de evaluación (pruebas orales y escritas, investigación, exposiciones, talleres etc.)."></textarea>
                </td>
                <td><input type="text" class="input-doc text-center doc-input"></td>
                <td><input type="date" class="input-doc doc-input text-center"></td>
            </tr>
            <tr>
                <td>Evaluaciones o pruebas de seguimiento (pruebas orales o escritas, trabajos de investigación, exposiciones en clase, talleres etc.)</td>
                <td><input type="text" class="input-doc text-center doc-input"></td>
                <td><input type="date" class="input-doc doc-input text-center"></td>
            </tr>
            <tr>
                <td>Pruebas institucionales</td>
                <td><input type="text" class="input-doc text-center doc-input"></td>
                <td><input type="date" class="input-doc doc-input text-center"></td>
            </tr>
            <tr>
                <td>Evaluación final</td>
                <td class="text-center font-bold">20%</td>
                <td><input type="date" class="input-doc doc-input text-center"></td>
            </tr>
        </table>

        <div class="text-[10px] mb-4">
            El registro de faltas de asistencia y el ingreso de notas se hará tal como se especifica en el Reglamento Estudiantil vigente.
        </div>

        <div class="text-[10px] mb-4 text-justify">
            <span class="font-bold">Condiciones para el desarrollo del curso:</span><br>
            Estas condiciones son particulares, el docente las propone; entre otras: utilización de implementos adecuados para el trabajo en laboratorios y Talleres; la utilización o no de celulares y otros equipos; la distribución de estudiantes para trabajos grupales, entre otros.
        </div>

        <div class="text-[10px] italic font-bold mb-8 text-justify pl-4">
            "Todas las personas que hacen parte de este curso reconocen que la Institución Universitaria ITM es un territorio diverso, seguro y protector. Se comprometen a fomentar un entorno respetuoso, equitativo e incluyente, en cumplimiento de la Política hacia la Equidad, las Diversidades Sexuales y las Identidades de Género, los protocolos que de ella se derivan y la ley 2365 de 2024. De este modo, docentes y estudiantes asumen la responsabilidad de contribuir a la identificación y atención oportuna de cualquier situación que vulnere la dignidad e integridad de las personas, favoreciendo la construcción de un ambiente seguro y libre de violencias".
        </div>

        <!-- PAGE 2 -->
        <div style="page-break-before: always; margin-top: 40px;"></div>
        <div class="font-bold text-[11px] mb-2">Estudiantes del Grupo:</div>
        <table class="mb-10 student-table">
            <thead>
                <tr class="bg-label text-center font-bold">
                    <td class="w-[5%]"></td>
                    <td class="w-[25%]">Documento</td>
                    <td class="w-[40%]">Nombre Completo</td>
                    <td class="w-[15%]">Teléfono</td>
                    <td class="w-[15%]">Firma</td>
                </tr>
            </thead>
            <tbody>
                ${Array.from({length: 28}).map((_, i) => `
                <tr>
                    <td class="text-center font-bold bg-label">${i + 1}.</td>
                    <td></td><td></td><td></td><td></td>
                </tr>`).join('')}
                <tr>
                    <td colspan="5" class="bg-gray-50 h-16 align-top p-2">
                        <span class="font-bold text-[10px]">Firma del Docente</span>
                    </td>
                </tr>
            </tbody>
        </table>
        `;

        let groupData = null;
        let published = false;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!grupoId) {
                alert('ID de grupo no especificado.');
                return;
            }
            await loadCompromiso();
        });

        async function loadCompromiso() {
            try {
                // Obtenemos info del grupo (donde está el JSON de Novedades)
                const res = await fetch(`${API_BASE}/grupos/mis-grupos?profesorId=${localStorage.getItem('userId')}`);
                // Nota: mis-grupos solo funciona si el usuario es el profesor. 
                // Para estudiantes necesitamos otro endpoint o que mis-inscripciones devuelva lo mismo.
                
                let novedadesStr = "";
                if (role === 'profesor') {
                    const resGroups = await fetch(`${API_BASE}/grupos/mis-grupos?profesorId=${currentUserId}`);
                    const groups = await resGroups.json();
                    groupData = groups.find(g => String(g.Id) === String(grupoId));
                    novedadesStr = groupData.Novedades;
                } else {
                    const resIns = await fetch(`${API_BASE}/grupos/mis-inscripciones?estudianteId=${currentUserId}`);
                    const inscripciones = await resIns.json();
                    const myIns = inscripciones.find(i => String(i.GrupoId) === String(grupoId));
                    novedadesStr = myIns.Novedades;
                }

                const data = parseNovedades(novedadesStr);
                published = data.compromiso?.publicado || false;

                renderCompromiso(data);
                setupUI(data);

            } catch (e) {
                console.error(e);
                document.getElementById('doc-container').innerHTML = "<div class='text-center p-10 text-red-500 font-bold'>Error al cargar el compromiso académico.</div>";
            }
        }

        function parseNovedades(str) {
            try {
                return JSON.parse(str || "{}");
            } catch (e) { return { avisos: str }; }
        }

        function renderCompromiso(data) {
            const container = document.getElementById('doc-container');
            // Intentar cargar la plantilla base guardada por el jefe (solo si existe localmente)
            // o usar la plantilla hardcoded de ITM
            const savedTemplate = localStorage.getItem('plantilla_base_compromiso');
            
            container.innerHTML = savedTemplate || templateITM;

            // Fill IDs for mapping
            const inputs = container.querySelectorAll('.doc-input');
            inputs.forEach((input, index) => {
                input.id = `campo-${index}`;
                if (data.compromiso?.campos && data.compromiso.campos[input.id] !== undefined) {
                    input.value = data.compromiso.campos[input.id];
                }
            });

            // Autocomplete Asignatura/Codigo if empty
            const elNombre = document.getElementById('asig-nombre');
            if (elNombre && !elNombre.value) elNombre.value = urlParams.get('asigNombre') || "";
            const elCodigo = document.getElementById('asig-codigo');
            if (elCodigo && !elCodigo.value) elCodigo.value = urlParams.get('cursoCodigo') || "";

            // Populate Student Table
            populateStudentTable(data.respuestas || []);

            // Read-only logic
            if (role === 'estudiante' || published) {
                container.querySelectorAll('input, textarea').forEach(el => el.readOnly = true);
            }
        }

        function populateStudentTable(respuestas) {
            const aceptados = respuestas.filter(r => r.estado === 'Aceptado');
            // Buscamos la tabla de estudiantes (la que tiene encabezado Documento, Nombre...)
            const tables = document.querySelectorAll('table');
            let studentTable = null;
            tables.forEach(t => {
                if (t.innerText.includes('Documento') && t.innerText.includes('Firma')) studentTable = t;
            });

            if (!studentTable) return;

            const tbody = studentTable.querySelector('tbody') || studentTable;
            const rows = tbody.querySelectorAll('tr');
            
            // Empezamos después del encabezado (index 1)
            let rowIndex = 1;
            aceptados.forEach((res, i) => {
                let datos = {};
                try { datos = JSON.parse(res.observacion); } catch(e) {}
                
                if (rowIndex >= rows.length - 1) {
                    // Agregar fila nueva si se acaba el espacio (antes de la fila de firma del docente)
                    const lastRow = rows[rows.length - 1];
                    const newRow = document.createElement('tr');
                    newRow.innerHTML = `
                        <td class="text-center font-bold bg-label">${rowIndex}.</td>
                        <td><input type="text" class="input-doc" readonly></td>
                        <td><input type="text" class="input-doc" readonly></td>
                        <td><input type="text" class="input-doc" readonly></td>
                        <td class="text-[8px] italic"></td>
                    `;
                    tbody.insertBefore(newRow, lastRow);
                }

                const currentRow = tbody.querySelectorAll('tr')[rowIndex];
                if (currentRow) {
                    const cells = currentRow.querySelectorAll('td');
                    if (cells.length >= 5) {
                        cells[1].innerHTML = `<span class="px-1">${datos.doc || ''}</span>`;
                        cells[2].innerHTML = `<span class="px-1">${datos.nom || ''}</span>`;
                        cells[3].innerHTML = `<span class="px-1">${datos.tel || ''}</span>`;
                        cells[4].innerHTML = `<span class="px-1 font-serif italic">${datos.sig || ''}</span>`;
                    }
                }
                rowIndex++;
            });
        }

        function setupUI(data) {
            const statusLabel = document.getElementById('status-label');
            const profActions = document.getElementById('prof-actions');
            const studentActions = document.getElementById('student-actions');

            if (published) {
                statusLabel.textContent = "Estado: PUBLICADO";
                statusLabel.className = "text-[10px] text-green-600 font-bold uppercase tracking-widest";
                profActions.classList.add('hidden'); // Ocultar botones de edición si ya está publicado
            } else {
                statusLabel.textContent = "Estado: BORRADOR";
                statusLabel.className = "text-[10px] text-gray-400 font-bold uppercase tracking-widest";
                if (role === 'profesor') profActions.classList.remove('hidden');
            }

            if (role === 'estudiante') {
                const myResp = (data.respuestas || []).find(r => String(r.estudianteId) === String(currentUserId));
                if (!myResp && published) {
                    studentActions.classList.remove('hidden');
                } else if (myResp) {
                    statusLabel.textContent += ` | MI RESPUESTA: ${myResp.estado.toUpperCase()}`;
                    studentActions.classList.add('hidden');
                }
            }
        }

        async function saveCompromiso(isPublishing) {
            const inputs = document.querySelectorAll('.doc-input');
            const campos = {};
            inputs.forEach(input => {
                campos[input.id] = input.value;
            });

            // Reutilizamos el endpoint de novedades pero enviamos un objeto complejo
            const payload = {
                avisos: groupData?.avisos || "",
                compromiso: {
                    publicado: isPublishing || published,
                    campos: campos
                }
            };

            try {
                const res = await fetch(`${API_BASE}/grupos/novedades/${grupoId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ Novedades: JSON.stringify(payload) })
                });

                if (res.ok) {
                    alert(isPublishing ? '¡Compromiso publicado con éxito!' : 'Borrador guardado.');
                    location.reload();
                } else {
                    alert('Error al guardar.');
                }
            } catch (e) { alert('Error de conexión.'); }
        }

        // LOGICA ESTUDIANTE
        function openAcceptModal() { document.getElementById('modal-accept').style.display = 'flex'; }
        function openRejectModal() { document.getElementById('modal-reject').style.display = 'flex'; }
        function closeModals() { 
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); 
        }

        async function enviarRespuesta(estado) {
            let observacion = "";
            
            if (estado === 'Rechazado') {
                observacion = document.getElementById('reject-reason').value;
                if (!observacion) { alert('Por favor indica el motivo.'); return; }
            } else {
                const doc = document.getElementById('stu-doc').value;
                const nom = document.getElementById('stu-name').value;
                const tel = document.getElementById('stu-tel').value;
                const sig = document.getElementById('stu-sign').value;

                // VALIDACIONES
                if (!/^\d{10}$/.test(doc)) { alert('El documento debe tener exactamente 10 dígitos numéricos.'); return; }
                if (/[0-9]/.test(nom) || !nom) { alert('El nombre no debe contener números.'); return; }
                if (!/^\d{1,10}$/.test(tel)) { alert('El teléfono debe ser numérico (máx 10 dígitos).'); return; }
                if (!sig) { alert('La firma es obligatoria.'); return; }

                observacion = JSON.stringify({ doc, nom, tel, sig });
            }

            try {
                const res = await fetch(`${API_BASE}/grupos/responder-compromiso`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        GrupoId: grupoId, 
                        EstudianteId: currentUserId, 
                        Estado: estado, 
                        Observacion: observacion 
                    })
                });

                if (res.ok) {
                    alert('Tu respuesta ha sido enviada correctamente.');
                    location.reload();
                } else {
                    alert('Error al enviar respuesta.');
                }
            } catch (e) { alert('Error de conexión.'); }
        }
    </script>
</body>

</html>
